server:
  port: 8081
spring:
  jmx:
    enabled: false   
  datasource:
    url: jdbc:mysql://localhost:3308/sport
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      
  # ========================================================
  # EMAIL VERIFICATION SETUP (Must configure for OTP to work!)
  # ========================================================
  mail:
    host: smtp.gmail.com
    port: 587
    # 1. Put your REAL Gmail address below:
    username: here
    # 2. Put your 16-character GOOGLE APP PASSWORD below (Do NOT use your normal login password):
    # -> Get it here: https://myaccount.google.com/apppasswords
    password: here
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
